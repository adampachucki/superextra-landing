<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Superextra Agent System Map</title>
		<style>
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			body {
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
				background: #0f1117;
				color: #c9d1d9;
				display: flex;
				height: 100vh;
				overflow: hidden;
			}

			/* Sidebar */
			.sidebar {
				width: 300px;
				min-width: 300px;
				background: #161b22;
				border-right: 1px solid #30363d;
				display: flex;
				flex-direction: column;
				overflow-y: auto;
			}
			.sidebar h1 {
				font-size: 14px;
				font-weight: 600;
				padding: 16px 16px 8px;
				color: #e6edf3;
				letter-spacing: 0.02em;
			}
			.sidebar h2 {
				font-size: 11px;
				font-weight: 600;
				text-transform: uppercase;
				letter-spacing: 0.08em;
				color: #8b949e;
				padding: 12px 16px 6px;
			}

			.preset-group {
				padding: 4px 16px 8px;
				display: flex;
				flex-wrap: wrap;
				gap: 6px;
			}
			.preset-btn {
				padding: 5px 10px;
				font-size: 11px;
				border: 1px solid #30363d;
				background: #21262d;
				color: #c9d1d9;
				border-radius: 6px;
				cursor: pointer;
				transition: all 0.15s;
			}
			.preset-btn:hover {
				border-color: #58a6ff;
				color: #58a6ff;
			}
			.preset-btn.active {
				background: #1f6feb;
				border-color: #1f6feb;
				color: #fff;
			}

			.toggle-group {
				padding: 4px 16px 4px;
			}
			.toggle-row {
				display: flex;
				align-items: center;
				gap: 8px;
				padding: 4px 0;
				cursor: pointer;
				font-size: 12px;
			}
			.toggle-row input {
				accent-color: #58a6ff;
			}
			.color-dot {
				width: 10px;
				height: 10px;
				border-radius: 50%;
				flex-shrink: 0;
			}
			.line-sample {
				width: 24px;
				height: 2px;
				flex-shrink: 0;
				border-radius: 1px;
			}

			.detail-panel {
				padding: 12px 16px;
				border-top: 1px solid #30363d;
				flex: 1;
				overflow-y: auto;
			}
			.detail-panel h3 {
				font-size: 13px;
				color: #e6edf3;
				margin-bottom: 6px;
			}
			.detail-panel .badge {
				display: inline-block;
				font-size: 10px;
				padding: 2px 6px;
				border-radius: 4px;
				margin-right: 4px;
				margin-bottom: 4px;
			}
			.detail-panel .meta {
				font-size: 11px;
				color: #8b949e;
				margin-bottom: 4px;
			}
			.detail-panel .desc {
				font-size: 12px;
				line-height: 1.5;
				color: #c9d1d9;
				margin-top: 8px;
			}
			.detail-panel .scope-list {
				font-size: 11px;
				color: #8b949e;
				margin-top: 6px;
				padding-left: 16px;
			}
			.detail-panel .scope-list li {
				margin-bottom: 2px;
			}
			.detail-panel .tools-list {
				margin-top: 8px;
			}
			.detail-panel .tool-tag {
				display: inline-block;
				font-size: 10px;
				padding: 2px 8px;
				background: #1c2333;
				border: 1px solid #30363d;
				border-radius: 4px;
				margin: 2px 2px;
				color: #79c0ff;
				font-family: 'SF Mono', Menlo, monospace;
			}
			.detail-panel .state-tag {
				display: inline-block;
				font-size: 10px;
				padding: 2px 8px;
				background: #1c2128;
				border: 1px solid #3d3222;
				border-radius: 4px;
				margin: 2px 2px;
				color: #e3b341;
				font-family: 'SF Mono', Menlo, monospace;
			}

			.comments-section {
				border-top: 1px solid #30363d;
				padding: 12px 16px;
				max-height: 200px;
				overflow-y: auto;
			}
			.comment-item {
				background: #21262d;
				border-radius: 6px;
				padding: 8px 10px;
				margin-bottom: 6px;
				font-size: 11px;
				position: relative;
			}
			.comment-item .comment-target {
				color: #58a6ff;
				font-weight: 600;
			}
			.comment-item .comment-text {
				color: #c9d1d9;
				margin-top: 3px;
			}
			.comment-item .comment-delete {
				position: absolute;
				top: 6px;
				right: 8px;
				background: none;
				border: none;
				color: #8b949e;
				cursor: pointer;
				font-size: 12px;
			}
			.comment-item .comment-delete:hover {
				color: #f85149;
			}

			/* Main area */
			.main {
				flex: 1;
				display: flex;
				flex-direction: column;
			}

			/* Canvas */
			.canvas-wrap {
				flex: 1;
				position: relative;
				overflow: hidden;
				background: #0d1117;
			}
			.canvas-wrap svg {
				width: 100%;
				height: 100%;
			}

			/* Zoom controls */
			.zoom-controls {
				position: absolute;
				top: 12px;
				right: 12px;
				display: flex;
				gap: 4px;
			}
			.zoom-btn {
				width: 30px;
				height: 30px;
				background: #21262d;
				border: 1px solid #30363d;
				color: #c9d1d9;
				border-radius: 6px;
				cursor: pointer;
				font-size: 14px;
				display: flex;
				align-items: center;
				justify-content: center;
			}
			.zoom-btn:hover {
				border-color: #58a6ff;
				color: #58a6ff;
			}

			/* Legend */
			.legend {
				position: absolute;
				bottom: 12px;
				left: 12px;
				background: #161b22ee;
				border: 1px solid #30363d;
				border-radius: 8px;
				padding: 10px 14px;
				font-size: 10px;
			}
			.legend-title {
				font-weight: 600;
				color: #8b949e;
				margin-bottom: 6px;
				text-transform: uppercase;
				letter-spacing: 0.06em;
			}
			.legend-row {
				display: flex;
				align-items: center;
				gap: 8px;
				margin-bottom: 3px;
				color: #8b949e;
			}

			/* Prompt output */
			.prompt-section {
				background: #161b22;
				border-top: 1px solid #30363d;
				padding: 12px 16px;
				max-height: 180px;
				overflow-y: auto;
			}
			.prompt-header {
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin-bottom: 8px;
			}
			.prompt-header span {
				font-size: 11px;
				color: #8b949e;
				font-weight: 600;
				text-transform: uppercase;
				letter-spacing: 0.06em;
			}
			.copy-btn {
				padding: 4px 12px;
				font-size: 11px;
				background: #238636;
				border: 1px solid #2ea043;
				color: #fff;
				border-radius: 6px;
				cursor: pointer;
			}
			.copy-btn:hover {
				background: #2ea043;
			}
			.copy-btn.copied {
				background: #1f6feb;
				border-color: #388bfd;
			}
			.prompt-text {
				font-family: 'SF Mono', Menlo, Consolas, monospace;
				font-size: 11px;
				line-height: 1.6;
				color: #c9d1d9;
				white-space: pre-wrap;
				word-break: break-word;
			}

			/* Comment modal */
			.modal-overlay {
				position: fixed;
				inset: 0;
				background: rgba(0, 0, 0, 0.6);
				z-index: 100;
				display: none;
				align-items: center;
				justify-content: center;
			}
			.modal-overlay.open {
				display: flex;
			}
			.modal {
				background: #161b22;
				border: 1px solid #30363d;
				border-radius: 10px;
				padding: 20px;
				width: 380px;
			}
			.modal h3 {
				font-size: 14px;
				color: #e6edf3;
				margin-bottom: 4px;
			}
			.modal .modal-sub {
				font-size: 11px;
				color: #8b949e;
				margin-bottom: 12px;
			}
			.modal textarea {
				width: 100%;
				height: 80px;
				background: #0d1117;
				border: 1px solid #30363d;
				border-radius: 6px;
				color: #c9d1d9;
				padding: 8px;
				font-size: 12px;
				font-family: inherit;
				resize: vertical;
			}
			.modal textarea:focus {
				outline: none;
				border-color: #58a6ff;
			}
			.modal-actions {
				display: flex;
				justify-content: flex-end;
				gap: 8px;
				margin-top: 10px;
			}
			.modal-actions button {
				padding: 6px 14px;
				font-size: 12px;
				border-radius: 6px;
				cursor: pointer;
				border: 1px solid #30363d;
			}
			.modal-cancel {
				background: #21262d;
				color: #c9d1d9;
			}
			.modal-save {
				background: #238636;
				border-color: #2ea043;
				color: #fff;
			}

			/* SVG node styles */
			.node-group {
				cursor: pointer;
			}
			.node-group:hover .node-rect {
				filter: brightness(1.2);
			}
			.node-group.has-comment .node-rect {
				stroke: #f0883e;
				stroke-width: 2.5;
			}
			.node-label {
				font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
				font-size: 12px;
				font-weight: 600;
				fill: #e6edf3;
				pointer-events: none;
			}
			.node-sub {
				font-family: 'SF Mono', Menlo, monospace;
				font-size: 9px;
				fill: #8b949e;
				pointer-events: none;
			}
			.node-model {
				font-family: 'SF Mono', Menlo, monospace;
				font-size: 8.5px;
				fill: #7ee787;
				pointer-events: none;
			}
			.node-type-badge {
				font-family: -apple-system, system-ui, sans-serif;
				font-size: 8px;
				font-weight: 600;
				fill: #0d1117;
				pointer-events: none;
			}

			.conn-label {
				font-family: 'SF Mono', Menlo, monospace;
				font-size: 8.5px;
				fill: #8b949e;
				pointer-events: none;
			}

			/* Animated flow */
			@keyframes flowDash {
				to {
					stroke-dashoffset: -20;
				}
			}
			.flow-animated {
				animation: flowDash 1.5s linear infinite;
			}
		</style>
	</head>
	<body>
		<!-- Sidebar -->
		<div class="sidebar">
			<h1>Superextra Agent System</h1>

			<h2>View Presets</h2>
			<div class="preset-group" id="presets"></div>

			<h2>Layers</h2>
			<div class="toggle-group" id="layers"></div>

			<h2>Connections</h2>
			<div class="toggle-group" id="connToggles"></div>

			<h2>Selected Agent</h2>
			<div class="detail-panel" id="detailPanel">
				<p style="font-size: 12px; color: #484f58">Click any agent node to see details</p>
			</div>

			<div class="comments-section" id="commentsSection">
				<h2 style="padding: 0 0 8px">Comments <span id="commentCount">(0)</span></h2>
				<div id="commentsList"></div>
			</div>
		</div>

		<!-- Main -->
		<div class="main">
			<div class="canvas-wrap" id="canvasWrap">
				<svg id="canvas" viewBox="0 0 1100 780"></svg>
				<div class="zoom-controls">
					<button class="zoom-btn" onclick="zoom(1.15)">+</button>
					<button class="zoom-btn" onclick="zoom(1 / 1.15)">&minus;</button>
					<button class="zoom-btn" onclick="resetZoom()" style="font-size: 10px">FIT</button>
				</div>
				<div class="legend">
					<div class="legend-title">Legend</div>
					<div class="legend-row">
						<svg width="24" height="10">
							<line x1="0" y1="5" x2="24" y2="5" stroke="#58a6ff" stroke-width="2" />
						</svg>
						Sequential flow
					</div>
					<div class="legend-row">
						<svg width="24" height="10">
							<line
								x1="0"
								y1="5"
								x2="24"
								y2="5"
								stroke="#f0883e"
								stroke-width="2"
								stroke-dasharray="6,3"
							/>
						</svg>
						State read/write
					</div>
					<div class="legend-row">
						<svg width="24" height="10">
							<line
								x1="0"
								y1="5"
								x2="24"
								y2="5"
								stroke="#7ee787"
								stroke-width="2"
								stroke-dasharray="4,4"
							/>
						</svg>
						Tool call
					</div>
					<div class="legend-row">
						<svg width="24" height="10">
							<line
								x1="0"
								y1="5"
								x2="24"
								y2="5"
								stroke="#bc8cff"
								stroke-width="2"
								stroke-dasharray="2,3"
							/>
						</svg>
						Callback
					</div>
					<div class="legend-row">
						<svg width="24" height="10">
							<line
								x1="0"
								y1="5"
								x2="24"
								y2="5"
								stroke="#f85149"
								stroke-width="2"
								stroke-dasharray="8,4"
							/>
						</svg>
						Transfer / dispatch
					</div>
				</div>
			</div>

			<div class="prompt-section">
				<div class="prompt-header">
					<span>Prompt Output</span>
					<button class="copy-btn" id="copyBtn" onclick="copyPrompt()">Copy</button>
				</div>
				<div class="prompt-text" id="promptOutput"></div>
			</div>
		</div>

		<!-- Comment modal -->
		<div class="modal-overlay" id="commentModal">
			<div class="modal">
				<h3 id="modalTitle">Add Comment</h3>
				<div class="modal-sub" id="modalSub"></div>
				<textarea id="modalText" placeholder="Your comment about this agent..."></textarea>
				<div class="modal-actions">
					<button class="modal-cancel" onclick="closeModal()">Cancel</button>
					<button class="modal-save" onclick="saveComment()">Save</button>
				</div>
			</div>
		</div>

			function getNodeCenter(n) {
				return { x: n.x + n.w / 2, y: n.y + n.h / 2 };
			}

			function getEdgePoint(n, target) {
				const nc = getNodeCenter(n),
					tc = target;
				const dx = tc.x - nc.x,
					dy = tc.y - nc.y;
				const absDx = Math.abs(dx),
					absDy = Math.abs(dy);
				const sx = n.w / 2,
					sy = n.h / 2;
				if (absDx * sy > absDy * sx) {
					const sign = dx > 0 ? 1 : -1;
					return { x: nc.x + sign * sx, y: nc.y + (dy / absDx) * sx };
				} else {
					const sign = dy > 0 ? 1 : -1;
					return { x: nc.x + (dx / absDy) * sy, y: nc.y + sign * sy };
				}
			}

			function renderDiagram() {
				svg.innerHTML = '';

				// Defs: arrow markers
				const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
				for (const [type, cfg] of Object.entries(CONN_TYPES)) {
					const m = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
					m.setAttribute('id', `arrow-${type}`);
					m.setAttribute('markerWidth', '8');
					m.setAttribute('markerHeight', '6');
					m.setAttribute('refX', '7');
					m.setAttribute('refY', '3');
					m.setAttribute('orient', 'auto');
					const p = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
					p.setAttribute('points', '0 0, 8 3, 0 6');
					p.setAttribute('fill', cfg.color);
					m.appendChild(p);
					defs.appendChild(m);
				}
				svg.appendChild(defs);

				// Connections
				const visibleNodeIds = new Set(nodes.filter((n) => state.layers[n.layer]).map((n) => n.id));
				const connGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
				for (const c of connections) {
					if (!state.connTypes[c.type]) continue;
					if (!visibleNodeIds.has(c.from) || !visibleNodeIds.has(c.to)) continue;

					const fromNode = nodes.find((n) => n.id === c.from);
					const toNode = nodes.find((n) => n.id === c.to);
					const fc = getNodeCenter(fromNode),
						tc = getNodeCenter(toNode);
					const ep1 = getEdgePoint(fromNode, tc);
					const ep2 = getEdgePoint(toNode, fc);

					const cfg = CONN_TYPES[c.type];
					const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
					const mx = (ep1.x + ep2.x) / 2,
						my = (ep1.y + ep2.y) / 2;
					const dx = ep2.x - ep1.x,
						dy = ep2.y - ep1.y;
					const len = Math.sqrt(dx * dx + dy * dy);
					const curveStrength = Math.min(len * 0.25, 40);
					const nx = (-dy / len) * curveStrength * 0.15,
						ny = (dx / len) * curveStrength * 0.15;
					const cx1 = mx + nx,
						cy1 = my + ny;

					path.setAttribute('d', `M ${ep1.x} ${ep1.y} Q ${cx1} ${cy1} ${ep2.x} ${ep2.y}`);
					path.setAttribute('fill', 'none');
					path.setAttribute('stroke', cfg.color);
					path.setAttribute('stroke-width', '1.5');
					path.setAttribute('stroke-opacity', '0.6');
					path.setAttribute('marker-end', `url(#arrow-${c.type})`);
					if (cfg.dash) path.setAttribute('stroke-dasharray', cfg.dash);
					connGroup.appendChild(path);

					if (c.label) {
						const lx = mx + nx * 0.5,
							ly = my + ny * 0.5 - 4;
						const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
						label.setAttribute('x', lx);
						label.setAttribute('y', ly);
						label.setAttribute('text-anchor', 'middle');
						label.classList.add('conn-label');
						label.textContent = c.label;
						connGroup.appendChild(label);
					}
				}
				svg.appendChild(connGroup);

				// Nodes
				const nodeGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
				for (const n of nodes) {
					if (!state.layers[n.layer]) continue;

					const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
					g.classList.add('node-group');
					if (state.comments.some((c) => c.target === n.id)) g.classList.add('has-comment');

					const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
					rect.classList.add('node-rect');
					rect.setAttribute('x', n.x);
					rect.setAttribute('y', n.y);
					rect.setAttribute('width', n.w);
					rect.setAttribute('height', n.h);
					rect.setAttribute('rx', '8');
					rect.setAttribute('fill', NODE_COLORS[n.layer]);
					rect.setAttribute('stroke', state.selected === n.id ? '#e6edf3' : NODE_BORDERS[n.layer]);
					rect.setAttribute('stroke-width', state.selected === n.id ? '2.5' : '1.5');
					g.appendChild(rect);

					// Type badge
					if (
						n.agentType &&
						n.agentType !== 'State key' &&
						n.agentType !== 'State keys' &&
						n.agentType !== 'External API' &&
						n.agentType !== 'Built-in tool' &&
						n.agentType !== 'FunctionTool'
					) {
						const badgeText = n.agentType
							.replace('LlmAgent (root)', 'Root')
							.replace('LlmAgent', 'Llm')
							.replace('ParallelAgent', 'Parallel')
							.replace('SequentialAgent', 'Sequential');
						const badgeW = badgeText.length * 5.2 + 10;
						const badge = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
						badge.setAttribute('x', n.x + n.w - badgeW - 6);
						badge.setAttribute('y', n.y + 4);
						badge.setAttribute('width', badgeW);
						badge.setAttribute('height', 14);
						badge.setAttribute('rx', '3');
						badge.setAttribute('fill', NODE_BORDERS[n.layer]);
						badge.setAttribute('fill-opacity', '0.8');
						g.appendChild(badge);
						const btext = document.createElementNS('http://www.w3.org/2000/svg', 'text');
						btext.setAttribute('x', n.x + n.w - badgeW / 2 - 6);
						btext.setAttribute('y', n.y + 14);
						btext.setAttribute('text-anchor', 'middle');
						btext.classList.add('node-type-badge');
						btext.textContent = badgeText;
						g.appendChild(btext);
					}

					const title = document.createElementNS('http://www.w3.org/2000/svg', 'text');
					title.setAttribute('x', n.x + 10);
					title.setAttribute('y', n.y + (n.layer === 'state' || n.layer === 'tools' ? 20 : 22));
					title.classList.add('node-label');
					if (n.layer === 'state' || n.layer === 'tools') title.style.fontSize = '10px';
					title.textContent = n.label;
					g.appendChild(title);

					if (n.layer !== 'state' && n.layer !== 'tools' && n.model) {
						const model = document.createElementNS('http://www.w3.org/2000/svg', 'text');
						model.setAttribute('x', n.x + 10);
						model.setAttribute('y', n.y + 36);
						model.classList.add('node-model');
						model.textContent = n.model;
						g.appendChild(model);
					}

					if (n.subtitle && n.layer !== 'state' && n.layer !== 'tools') {
						const sub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
						sub.setAttribute('x', n.x + 10);
						sub.setAttribute('y', n.y + 46);
						sub.classList.add('node-sub');
						sub.textContent = n.subtitle;
						g.appendChild(sub);
					}

					g.addEventListener('click', (e) => {
						e.stopPropagation();
						selectNode(n.id);
					});
					g.addEventListener('dblclick', (e) => {
						e.stopPropagation();
						openCommentModal(n.id);
					});
					nodeGroup.appendChild(g);
				}
				svg.appendChild(nodeGroup);

				// Pipeline bracket label
				if (
					state.layers.enrichment ||
					state.layers.planning ||
					state.layers.specialists ||
					state.layers.synthesis
				) {
					const bracketGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');

					const bracketLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
					bracketLabel.setAttribute('x', 12);
					bracketLabel.setAttribute('y', 380);
					bracketLabel.setAttribute('transform', 'rotate(-90, 12, 380)');
					bracketLabel.setAttribute('text-anchor', 'middle');
					bracketLabel.setAttribute('font-size', '10');
					bracketLabel.setAttribute('fill', '#484f58');
					bracketLabel.setAttribute('font-family', '-apple-system, system-ui, sans-serif');
					bracketLabel.setAttribute('font-weight', '600');
					bracketLabel.textContent = 'RESEARCH PIPELINE (SequentialAgent)';
					bracketGroup.appendChild(bracketLabel);

					const bracketLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
					bracketLine.setAttribute('x1', '24');
					bracketLine.setAttribute('y1', '110');
					bracketLine.setAttribute('x2', '24');
					bracketLine.setAttribute('y2', '650');
					bracketLine.setAttribute('stroke', '#30363d');
					bracketLine.setAttribute('stroke-width', '2');
					bracketLine.setAttribute('stroke-dasharray', '4,2');
					bracketGroup.appendChild(bracketLine);

					svg.appendChild(bracketGroup);
				}
			}

			function selectNode(id) {
				state.selected = id;
				renderDiagram();
				renderDetail();
			}

			function renderDetail() {
				const panel = document.getElementById('detailPanel');
				if (!state.selected) {
					panel.innerHTML =
						'<p style="font-size: 12px; color: #484f58;">Click any agent node to see details.<br>Double-click to add a comment.</p>';
					return;
				}
				const n = nodes.find((nd) => nd.id === state.selected);
				const layerCfg = LAYERS[n.layer];

				let html = `<h3>${n.label}</h3>`;
				html += `<span class="badge" style="background:${layerCfg.color}30;color:${layerCfg.color};border:1px solid ${layerCfg.color}50">${layerCfg.label}</span>`;
				if (n.agentType)
					html += `<span class="badge" style="background:#30363d;color:#8b949e">${n.agentType}</span>`;
				if (n.model && n.model !== '\u2014')
					html += `<div class="meta" style="color:#7ee787;margin-top:6px">\u2699 ${n.model}</div>`;
				if (n.file) html += `<div class="meta">instructions/${n.file}</div>`;
				if (n.subtitle) html += `<div class="meta">${n.subtitle}</div>`;
				html += `<div class="desc">${n.desc}</div>`;

				if (n.scope.length) {
					html += '<ul class="scope-list">';
					n.scope.forEach((s) => (html += `<li>${s}</li>`));
					html += '</ul>';
				}

				if (n.tools.length) {
					html +=
						'<div class="tools-list"><div class="meta" style="margin-bottom:2px">Tools:</div>';
					n.tools.forEach((t) => (html += `<span class="tool-tag">${t}</span>`));
					html += '</div>';
				}

				if (n.stateWrite.length) {
					html +=
						'<div class="tools-list"><div class="meta" style="margin-bottom:2px">State writes:</div>';
					n.stateWrite.forEach((s) => (html += `<span class="state-tag">\u2192 ${s}</span>`));
					html += '</div>';
				}

				if (n.stateRead.length) {
					html +=
						'<div class="tools-list"><div class="meta" style="margin-bottom:2px">State reads:</div>';
					n.stateRead.forEach((s) => (html += `<span class="state-tag">\u2190 ${s}</span>`));
					html += '</div>';
				}

				if (n.callbacks.length) {
					html +=
						'<div class="tools-list"><div class="meta" style="margin-bottom:2px">Callbacks:</div>';
					n.callbacks.forEach(
						(c) =>
							(html += `<span class="tool-tag" style="color:#bc8cff;border-color:#3d2460">${c}</span>`)
					);
					html += '</div>';
				}

				panel.innerHTML = html;
			}

			// ── CONTROLS ──────────────────────────────────────────────────────

			function renderPresets() {
				const container = document.getElementById('presets');
				container.innerHTML = '';
				for (const [key, preset] of Object.entries(PRESETS)) {
					const btn = document.createElement('button');
					btn.className = `preset-btn${state.preset === key ? ' active' : ''}`;
					btn.textContent = preset.label;
					btn.onclick = () => {
						state.preset = key;
						state.layers = { ...preset.layers };
						renderAll();
					};
					container.appendChild(btn);
				}
			}

			function renderLayerToggles() {
				const container = document.getElementById('layers');
				container.innerHTML = '';
				for (const [key, cfg] of Object.entries(LAYERS)) {
					const row = document.createElement('label');
					row.className = 'toggle-row';
					const cb = document.createElement('input');
					cb.type = 'checkbox';
					cb.checked = state.layers[key];
					cb.onchange = () => {
						state.layers[key] = cb.checked;
						state.preset = '';
						renderAll();
					};
					const dot = document.createElement('span');
					dot.className = 'color-dot';
					dot.style.background = cfg.color;
					row.appendChild(cb);
					row.appendChild(dot);
					row.appendChild(document.createTextNode(cfg.label));
					container.appendChild(row);
				}
			}

			function renderConnToggles() {
				const container = document.getElementById('connToggles');
				container.innerHTML = '';
				for (const [key, cfg] of Object.entries(CONN_TYPES)) {
					const row = document.createElement('label');
					row.className = 'toggle-row';
					const cb = document.createElement('input');
					cb.type = 'checkbox';
					cb.checked = state.connTypes[key];
					cb.onchange = () => {
						state.connTypes[key] = cb.checked;
						renderDiagram();
						updatePrompt();
					};
					const line = document.createElement('span');
					line.className = 'line-sample';
					line.style.background = cfg.color;
					if (cfg.dash)
						line.style.background = `repeating-linear-gradient(90deg, ${cfg.color} 0 4px, transparent 4px 7px)`;
					row.appendChild(cb);
					row.appendChild(line);
					row.appendChild(document.createTextNode(cfg.label));
					container.appendChild(row);
				}
			}

			// ── COMMENTS ──────────────────────────────────────────────────────

			function openCommentModal(nodeId) {
				state.commentTarget = nodeId;
				const n = nodes.find((nd) => nd.id === nodeId);
				document.getElementById('modalTitle').textContent = `Comment on: ${n.label}`;
				document.getElementById('modalSub').textContent = `${n.agentType} \u2022 ${n.subtitle}`;
				document.getElementById('modalText').value = '';
				document.getElementById('commentModal').classList.add('open');
				setTimeout(() => document.getElementById('modalText').focus(), 50);
			}

			function closeModal() {
				document.getElementById('commentModal').classList.remove('open');
				state.commentTarget = null;
			}

			function saveComment() {
				const text = document.getElementById('modalText').value.trim();
				if (!text || !state.commentTarget) return;
				const n = nodes.find((nd) => nd.id === state.commentTarget);
				state.comments.push({
					id: Date.now(),
					target: n.id,
					targetLabel: n.label,
					targetFile: n.subtitle,
					text
				});
				closeModal();
				renderComments();
				renderDiagram();
				updatePrompt();
			}

			function deleteComment(id) {
				state.comments = state.comments.filter((c) => c.id !== id);
				renderComments();
				renderDiagram();
				updatePrompt();
			}

			function renderComments() {
				const list = document.getElementById('commentsList');
				document.getElementById('commentCount').textContent = `(${state.comments.length})`;
				if (!state.comments.length) {
					list.innerHTML =
						'<p style="font-size: 11px; color: #484f58;">Double-click an agent to add a comment</p>';
					return;
				}
				list.innerHTML = state.comments
					.map(
						(c) => `
    <div class="comment-item">
      <div class="comment-target">${c.targetLabel}</div>
      <div class="comment-text">${c.text}</div>
      <button class="comment-delete" onclick="deleteComment(${c.id})">\u2715</button>
    </div>
  `
					)
					.join('');
			}

			// ── PROMPT OUTPUT ─────────────────────────────────────────────────

			function updatePrompt() {
				const el = document.getElementById('promptOutput');
				const parts = [];

				const visibleLayers = Object.entries(state.layers)
					.filter(([, v]) => v)
					.map(([k]) => LAYERS[k].label);
				parts.push(
					`This is the Superextra multi-agent research system, currently showing: ${visibleLayers.join(', ')}.`
				);

				parts.push('');
				parts.push('Architecture overview:');
				parts.push(
					'- Router (Gemini 2.5 Flash) gates entry, transferring to a SequentialAgent research pipeline'
				);
				parts.push(
					'- Pipeline: Context Enricher \u2192 Research Orchestrator \u2192 Specialist Pool (parallel) \u2192 Synthesizer'
				);
				parts.push(
					'- Orchestrator audits user assumptions, runs reconnaissance, crafts briefs for 2-5 specialists'
				);
				parts.push(
					'- 9 specialists (7 domain + 2 dynamic) run in parallel via ParallelAgent, skip if not assigned'
				);
				parts.push(
					'- Synthesizer cross-checks premise verdicts, leads with truth over expected answers'
				);
				parts.push(
					'- State-based coordination: agents share data via session state keys (places_context, specialist_briefs, *_result)'
				);
				parts.push(
					'- Three-layer objectivity: Orchestrator audits \u2192 Specialists align \u2192 Synthesizer cross-checks'
				);

				if (state.comments.length) {
					parts.push('');
					parts.push('Feedback on specific agents:');
					for (const c of state.comments) {
						parts.push('');
						parts.push(`**${c.targetLabel}** (${c.targetFile}):`);
						parts.push(c.text);
					}
				}

				el.textContent = parts.join('\n');
			}

			function copyPrompt() {
				const text = document.getElementById('promptOutput').textContent;
				navigator.clipboard.writeText(text).then(() => {
					const btn = document.getElementById('copyBtn');
					btn.textContent = 'Copied!';
					btn.classList.add('copied');
					setTimeout(() => {
						btn.textContent = 'Copy';
						btn.classList.remove('copied');
					}, 1500);
				});
			}

			// ── ZOOM ──────────────────────────────────────────────────────────

			function zoom(factor) {
				state.zoom *= factor;
				state.zoom = Math.max(0.3, Math.min(3, state.zoom));
				applyZoom();
			}

			function resetZoom() {
				state.zoom = 1;
				state.panX = 0;
				state.panY = 0;
				applyZoom();
			}

			function applyZoom() {
				const vw = 1100 / state.zoom,
					vh = 780 / state.zoom;
				const ox = (1100 - vw) / 2 - state.panX;
				const oy = (780 - vh) / 2 - state.panY;
				svg.setAttribute('viewBox', `${ox} ${oy} ${vw} ${vh}`);
			}

			// Pan
			let isPanning = false,
				panStart = { x: 0, y: 0 };
			const canvasWrap = document.getElementById('canvasWrap');
			canvasWrap.addEventListener('mousedown', (e) => {
				if (e.target === svg || e.target === canvasWrap) {
					isPanning = true;
					panStart = { x: e.clientX, y: e.clientY };
					canvasWrap.style.cursor = 'grabbing';
				}
			});
			window.addEventListener('mousemove', (e) => {
				if (!isPanning) return;
				const dx = (e.clientX - panStart.x) / state.zoom;
				const dy = (e.clientY - panStart.y) / state.zoom;
				state.panX += dx;
				state.panY += dy;
				panStart = { x: e.clientX, y: e.clientY };
				applyZoom();
			});
			window.addEventListener('mouseup', () => {
				isPanning = false;
				canvasWrap.style.cursor = '';
			});

			canvasWrap.addEventListener(
				'wheel',
				(e) => {
					e.preventDefault();
					zoom(e.deltaY < 0 ? 1.08 : 1 / 1.08);
				},
				{ passive: false }
			);

			// Click blank to deselect
			svg.addEventListener('click', () => {
				state.selected = null;
				renderDiagram();
				renderDetail();
			});

			// Escape to close modal
			window.addEventListener('keydown', (e) => {
				if (e.key === 'Escape') closeModal();
			});

			// ── INIT ──────────────────────────────────────────────────────────

			function renderAll() {
				renderPresets();
				renderLayerToggles();
				renderConnToggles();
				renderDiagram();
				renderDetail();
				renderComments();
				updatePrompt();
			}

			renderAll();
		</script>
	</body>
</html>
