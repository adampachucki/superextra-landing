[tool.ruff]
target-version = "py312"

# Lint only — `ruff format` is deliberately not adopted (it would rewrite
# most of the package; revisit as a dedicated commit if ever).
[tool.ruff.lint]
select = [
    "E4", # imports
    "E7", # statement style
    "E9", # syntax errors
    "F",  # pyflakes (unused imports/variables, f-strings, ...)
    "I",  # import sorting
]

[tool.ruff.lint.per-file-ignores]
# Package entrypoint: ADK discovers the app via `superextra_agent.agent`.
"superextra_agent/__init__.py" = ["F401"]
# Live eval tests set env vars before importing the agent modules.
"tests/test_follow_up_routing.py" = ["E402"]
"tests/test_router_evals.py" = ["E402"]
