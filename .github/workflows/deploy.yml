name: Deploy to Firebase

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run format:check
      - run: npx eslint .
      - run: npm run check
        env:
          PUBLIC_GOOGLE_PLACES_KEY: ${{ secrets.PUBLIC_GOOGLE_PLACES_KEY }}
      - run: npm run test:unit -- --run
      - run: npm run build
        env:
          PUBLIC_GOOGLE_PLACES_KEY: ${{ secrets.PUBLIC_GOOGLE_PLACES_KEY }}
      - run: cd functions && npm ci
      - run: cd functions && npm test

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SUPEREXTRA_SITE }}

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SUPEREXTRA_SITE }}
          channelId: live
          projectId: superextra-site

      - name: Deploy Cloud Functions
        run: npx firebase-tools deploy --only functions --project superextra-site

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run agent tests
        run: |
          cd agent
          pip install pytest pytest-asyncio respx google-adk
          PYTHONPATH=. pytest tests/ -v

      - name: Deploy ADK agent to Cloud Run
        run: |
          set -euo pipefail
          pip install google-adk

          # Snapshot current revision before deploy
          BEFORE=$(gcloud run revisions list \
            --service=superextra-agent \
            --region=us-central1 \
            --project=superextra-site \
            --limit=1 \
            --format="value(metadata.name)" 2>/dev/null || echo "none")

          cd agent
          # adk deploy returns exit 0 even when gcloud fails — capture output
          OUTPUT=$(adk deploy cloud_run \
            --project=superextra-site \
            --region=us-central1 \
            --service_name=superextra-agent \
            --session_service_uri=agentengine://2746721333428617216 \
            --trace_to_cloud \
            superextra_agent \
            -- --no-allow-unauthenticated \
            --update-env-vars=GOOGLE_PLACES_API_KEY=${{ secrets.GOOGLE_PLACES_API_KEY }} 2>&1) || true
          echo "$OUTPUT"

          # Verify a new revision was actually created
          AFTER=$(gcloud run revisions list \
            --service=superextra-agent \
            --region=us-central1 \
            --project=superextra-site \
            --limit=1 \
            --format="value(metadata.name)" 2>/dev/null || echo "none")

          if [ "$BEFORE" = "$AFTER" ]; then
            echo "::error::ADK Cloud Run deploy failed — no new revision created (stuck on $BEFORE)"
            exit 1
          fi
          echo "✓ New revision deployed: $AFTER (was $BEFORE)"

      - name: Smoke test agent
        run: |
          set -euo pipefail
          sleep 10

          TOKEN=$(gcloud auth print-identity-token \
            --audiences=https://superextra-agent-907466498524.us-central1.run.app)

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            "https://superextra-agent-907466498524.us-central1.run.app/list_apps" \
            --max-time 15)

          if [ "$STATUS" != "200" ]; then
            echo "::error::Smoke test failed — /list_apps returned HTTP $STATUS"
            exit 1
          fi
          echo "Smoke test passed (HTTP $STATUS)"
