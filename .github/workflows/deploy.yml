name: Deploy to Firebase

on:
  push:
    branches: [main]

# Opt JavaScript actions into Node 24 ahead of the 2026-06-02 forced switch.
# Without this, GitHub emits deprecation warnings for every step that still
# uses a Node-20-compiled action (checkout, setup-*, auth, download/upload-
# artifact). The actions themselves run the same — only the Node runtime
# invoking them changes.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run format:check
      - run: npx eslint .
      - run: npm run check
        env:
          PUBLIC_GOOGLE_PLACES_KEY: ${{ secrets.PUBLIC_GOOGLE_PLACES_KEY }}
      - run: npm run test:unit -- --run

      # Firestore rules emulator tests — protects against rule regressions
      # on sessions + collection-group events. Runs the Firestore emulator
      # via firebase-tools, which requires JDK 21+ (ubuntu-latest ships
      # Java 17 by default, so we install 21 explicitly here).
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: npm run test:rules

      - run: npm run build
        env:
          PUBLIC_GOOGLE_PLACES_KEY: ${{ secrets.PUBLIC_GOOGLE_PLACES_KEY }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sveltekit-build
          path: build/
          retention-days: 1

      - run: cd functions && npm ci
      - run: cd functions && npm test

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: agent/requirements-dev.txt

      - name: Run agent tests
        run: |
          cd agent
          pip install -r requirements-dev.txt
          PYTHONPATH=. pytest tests/ -v

  deploy-hosting:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: sveltekit-build
          path: build/

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SUPEREXTRA_SITE }}

      - run: cd functions && npm ci

      # firebase-functions v2 loads `.env.<projectId>` into process.env at
      # deploy time AND `firebase deploy` REPLACES the deployed function's
      # env vars with whatever the .env file declares. So every var the
      # function needs at runtime must be in this file at deploy time —
      # anything missing gets stripped on each deploy.
      - name: Write functions .env (GEAR resource)
        run: |
          echo "GEAR_REASONING_ENGINE_RESOURCE=projects/907466498524/locations/us-central1/reasoningEngines/1179666575196684288" \
            > functions/.env.superextra-site
          echo "✓ wrote functions/.env.superextra-site:"
          cat functions/.env.superextra-site | sed 's/=.*/=***/'

      # Single firebase-tools deploy for hosting + functions + firestore
      # rules + indexes. Separate `--only hosting` then `--only functions`
      # calls create a cutover window where the new frontend JS is live but
      # the old agentStream is still running. Deploying all four targets
      # in one invocation minimises that window.
      - name: Deploy Firebase Hosting + Functions + Firestore rules + indexes
        run: |
          npx firebase-tools deploy \
            --only hosting,functions,firestore:rules,firestore:indexes \
            --project superextra-site \
            --force
