name: Deploy to Firebase

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run format:check
      - run: npx eslint .
      - run: npm run check
        env:
          PUBLIC_GOOGLE_PLACES_KEY: ${{ secrets.PUBLIC_GOOGLE_PLACES_KEY }}
      - run: npm run test:unit -- --run
      - run: npm run build
        env:
          PUBLIC_GOOGLE_PLACES_KEY: ${{ secrets.PUBLIC_GOOGLE_PLACES_KEY }}
      - run: cd functions && npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SUPEREXTRA_SITE }}

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SUPEREXTRA_SITE }}
          channelId: live
          projectId: superextra-site

      - name: Deploy Cloud Functions
        run: npx firebase-tools deploy --only functions --project superextra-site

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Deploy ADK agent to Cloud Run
        run: |
          set -euo pipefail
          pip install google-adk
          cd agent
          adk deploy cloud_run \
            --project=superextra-site \
            --region=us-central1 \
            --service_name=superextra-agent \
            --session_service_uri=agentengine://2746721333428617216 \
            --trace_to_cloud \
            superextra_agent \
            -- --no-allow-unauthenticated \
               --set-env-vars="GOOGLE_CLOUD_LOCATION=global,GOOGLE_GENAI_USE_VERTEXAI=TRUE,GEMINI_VERSION=3.1"
