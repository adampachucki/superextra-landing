<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap"
			rel="stylesheet"
		/>
		<style>
			html,
			body {
				margin: 0;
				padding: 0;
			}
			/* 820x312 @2x = 1640x624. Content kept in center safe zone for mobile crop. */
			#cv {
				width: 820px;
				height: 312px;
				background: #fefdf9;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				font-family:
					'Inter',
					-apple-system,
					BlinkMacSystemFont,
					sans-serif;
			}
			.mark {
				display: flex;
				align-items: center;
				gap: 5px;
			}
			.mark svg {
				width: 44px;
				height: 44px;
				margin-top: -20px;
			}
			.mark span {
				font-size: 54px;
				font-weight: 300;
				letter-spacing: -0.03em;
				color: #1a1a1a;
			}
			.tag {
				margin-top: 14px;
				font-size: 19px;
				font-weight: 300;
				letter-spacing: 0.01em;
				color: rgba(26, 26, 26, 0.55);
			}
		</style>
	</head>
	<body>
		<div id="cv">
			<div class="mark">
				<svg viewBox="0 0 12 12" fill="none">
					<line x1="6" y1="0.5" x2="6" y2="11.5" stroke="#1a1a1a" stroke-width="1.5" />
					<line x1="1.24" y1="3.25" x2="10.76" y2="8.75" stroke="#1a1a1a" stroke-width="1.5" />
					<line x1="1.24" y1="8.75" x2="10.76" y2="3.25" stroke="#1a1a1a" stroke-width="1.5" />
				</svg>
				<span>Superextra</span>
			</div>
			<div class="tag">An AI consultant for every restaurant</div>
		</div>
	</body>
</html>
