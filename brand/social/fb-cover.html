<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			html,
			body {
				margin: 0;
				padding: 0;
			}
			/* 820x312 @2x = 1640x624. Lockup anchored lower-RIGHT to clear FB's bottom-left page avatar. */
			#cv {
				position: relative;
				width: 820px;
				height: 312px;
				background: #fefdf9;
				font-family:
					-apple-system, BlinkMacSystemFont, 'Inter', ui-sans-serif, system-ui, sans-serif;
			}
			.lock {
				position: absolute;
				right: 54px;
				bottom: 52px;
				display: flex;
				flex-direction: column;
				align-items: flex-start;
			}
			.mark {
				display: flex;
				align-items: center;
				gap: 4.36px;
			}
			.mark svg {
				width: 39.27px;
				height: 39.27px;
				margin-top: -17.45px;
			}
			.mark span {
				font-size: 48px;
				font-weight: 300;
				letter-spacing: -0.025em;
				color: #1a1a1a;
			}
			.tag {
				margin-top: 2.4px;
				font-size: 17px;
				font-weight: 300;
				letter-spacing: 0.01em;
				color: rgba(26, 26, 26, 0.55);
				text-align: left;
			}
		</style>
	</head>
	<body>
		<div id="cv">
			<div class="lock">
				<div class="mark">
					<svg viewBox="0 0 12 12" fill="none">
						<line x1="6" y1="0.5" x2="6" y2="11.5" stroke="#1a1a1a" stroke-width="1.5" />
						<line x1="1.24" y1="3.25" x2="10.76" y2="8.75" stroke="#1a1a1a" stroke-width="1.5" />
						<line x1="1.24" y1="8.75" x2="10.76" y2="3.25" stroke="#1a1a1a" stroke-width="1.5" />
					</svg>
					<span>Superextra</span>
				</div>
				<div class="tag">AI consultant for every restaurant</div>
			</div>
		</div>
	</body>
</html>
