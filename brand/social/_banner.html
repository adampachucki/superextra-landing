<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			html,
			body {
				margin: 0;
				padding: 0;
			}
			/* Editorial lockup on cream ("our white"). Params: ?w=&h=&word=&tag=&a=  (a=l lower-left | r lower-right).
         Mark proportions are the exact navbar ratios: mark=18/22*word, raised=8/22*word, gap=2/22*word. */
			#bn {
				position: relative;
				background: #fefdf9;
				font-family:
					-apple-system, BlinkMacSystemFont, 'Inter', ui-sans-serif, system-ui, sans-serif;
			}
			.lock {
				position: absolute;
				display: flex;
				flex-direction: column;
				align-items: flex-start;
			}
			.mark {
				display: flex;
				align-items: center;
			}
			.mark span {
				font-weight: 300;
				letter-spacing: -0.025em;
				color: #1a1a1a;
			}
			.tag {
				font-weight: 300;
				letter-spacing: 0.01em;
				color: rgba(26, 26, 26, 0.55);
				text-align: left;
			}
		</style>
	</head>
	<body>
		<div id="bn">
			<div class="lock">
				<div class="mark">
					<svg viewBox="0 0 12 12" fill="none">
						<line x1="6" y1="0.5" x2="6" y2="11.5" stroke="#1a1a1a" stroke-width="1.5" />
						<line x1="1.24" y1="3.25" x2="10.76" y2="8.75" stroke="#1a1a1a" stroke-width="1.5" />
						<line x1="1.24" y1="8.75" x2="10.76" y2="3.25" stroke="#1a1a1a" stroke-width="1.5" />
					</svg>
					<span>Superextra</span>
				</div>
				<div class="tag">AI consultant for every restaurant</div>
			</div>
		</div>
		<script>
			const p = new URLSearchParams(location.search);
			const w = +p.get('w'),
				h = +p.get('h'),
				word = +p.get('word'),
				tag = +(p.get('tag') || 0);
			const anchor = p.get('a') || 'l';
			const bn = document.getElementById('bn');
			bn.style.width = w + 'px';
			bn.style.height = h + 'px';
			const mk = document.querySelector('.mark');
			mk.style.gap = word * (2 / 22) + 'px';
			const svg = mk.querySelector('svg');
			svg.style.width = word * (18 / 22) + 'px';
			svg.style.height = word * (18 / 22) + 'px';
			svg.style.marginTop = -word * (8 / 22) + 'px';
			mk.querySelector('span').style.fontSize = word + 'px';
			const t = document.querySelector('.tag');
			if (tag) {
				t.style.fontSize = tag + 'px';
				t.style.marginTop = word * 0.3 + 'px';
			} else {
				t.remove();
			}
			// lower-left or lower-right anchor with margin proportional to height
			const m = Math.round(h * 0.17);
			const lock = document.querySelector('.lock');
			lock.style.bottom = m + 'px';
			if (anchor === 'r') lock.style.right = m + 'px';
			else lock.style.left = m + 'px';
		</script>
	</body>
</html>
