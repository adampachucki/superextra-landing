<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap"
			rel="stylesheet"
		/>
		<style>
			html,
			body {
				margin: 0;
				padding: 0;
			}
			/* Dimensions + font sizes come from URL params; render at 2x device scale for retina.
         ?w=&h=&word=&tag=  (tag font px; omit/0 to hide). Mark proportions match the navbar:
         mark = 0.82*word, raised = 0.36*word, gap = 0.09*word. */
			#bn {
				background: #fefdf9;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				font-family:
					'Inter',
					-apple-system,
					BlinkMacSystemFont,
					sans-serif;
			}
			.mark {
				display: flex;
				align-items: center;
			}
			.mark span {
				font-weight: 300;
				letter-spacing: -0.03em;
				color: #1a1a1a;
			}
			.tag {
				font-weight: 300;
				letter-spacing: 0.01em;
				color: rgba(26, 26, 26, 0.55);
			}
		</style>
	</head>
	<body>
		<div id="bn">
			<div class="mark">
				<svg viewBox="0 0 12 12" fill="none">
					<line x1="6" y1="0.5" x2="6" y2="11.5" stroke="#1a1a1a" stroke-width="1.5" />
					<line x1="1.24" y1="3.25" x2="10.76" y2="8.75" stroke="#1a1a1a" stroke-width="1.5" />
					<line x1="1.24" y1="8.75" x2="10.76" y2="3.25" stroke="#1a1a1a" stroke-width="1.5" />
				</svg>
				<span>Superextra</span>
			</div>
			<div class="tag">An AI consultant for every restaurant</div>
		</div>
		<script>
			const p = new URLSearchParams(location.search);
			const w = +p.get('w'),
				h = +p.get('h'),
				word = +p.get('word'),
				tag = +(p.get('tag') || 0);
			const bn = document.getElementById('bn');
			bn.style.width = w + 'px';
			bn.style.height = h + 'px';
			const mk = document.querySelector('.mark');
			mk.style.gap = word * 0.09 + 'px';
			const svg = mk.querySelector('svg');
			svg.style.width = word * 0.82 + 'px';
			svg.style.height = word * 0.82 + 'px';
			svg.style.marginTop = -word * 0.36 + 'px';
			mk.querySelector('span').style.fontSize = word + 'px';
			const t = document.querySelector('.tag');
			if (tag) {
				t.style.fontSize = tag + 'px';
				t.style.marginTop = word * 0.28 + 'px';
			} else {
				t.remove();
			}
		</script>
	</body>
</html>
